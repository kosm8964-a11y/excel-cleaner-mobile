<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 清洗工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1>Excel 清洗工具</h1>
            <p class="subtitle">上传 Excel 文件后进行基础清洗</p>
        </header>

        <section class="card" aria-label="上传文件区域">
            <h2>上传文件</h2>

            <form method="post" enctype="multipart/form-data" class="upload-form">
                <label class="upload-box" for="excel-file">
                    <input id="excel-file" name="excel_file" type="file" accept=".xlsx" required>
                    <span>点击选择 .xlsx 文件</span>
                    <small>当前仅支持上传并保存文件，清洗功能下一步实现</small>
                </label>

                <button class="primary-btn" type="submit">上传文件</button>
            </form>

            {% if message %}
            <p class="status-message {{ message_type }}">{{ message }}</p>
            {% endif %}
        </section>

        <section class="card" aria-label="清洗规则">
            <h2>清洗规则</h2>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" name="rules" checked>
                    <span>删除空白行</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="rules" checked>
                    <span>删除空白列</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="rules" checked>
                    <span>去除单元格首尾空格</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="rules" checked>
                    <span>清理表头空格</span>
                </label>
            </div>
        </section>

        <section class="card result" aria-label="结果预览">
            <h2>结果预览</h2>
            <p>上传成功后，后续将在这里显示清洗结果。</p>
        </section>
    </main>
</body>
</html>
